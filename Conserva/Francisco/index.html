<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Conservação</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, #0f3d1e, #2e7d32, #66bb6a);
      color: white;
      text-align: center;
      overflow-x: hidden;
    }

    header {
      padding: 40px 20px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.9;
    }

    .team {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 30px;
      padding: 40px;
      flex-wrap: wrap;
    }

    .member {
      cursor: pointer;
      transition: 0.5s;
      opacity: 0.6;
    }

    .member img {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 5px solid white;
      object-fit: cover;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      transition: 0.5s;
    }

    .member:hover img {
      transform: scale(1.1);
    }

    .member h3 {
      margin-top: 10px;
    }

    .member.active {
      transform: scale(1.4);
      opacity: 1;
    }

    .info {
      margin-top: 20px;
      padding: 30px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      backdrop-filter: blur(10px);
      font-size: 18px;
    }

    footer {
      margin-top: 50px;
      padding: 20px;
      font-size: 14px;
      opacity: 0.8;
    }

    @media (max-width: 800px) {
      .member img {
        width: 120px;
        height: 120px;
      }
    }

    /* Estilos para o Login */
    #login {
      margin-top: 50px;
    }

    #login input {
      padding: 10px;
      width: 200px;
      margin-bottom: 15px;
      border-radius: 5px;
      border: none;
      font-size: 16px;
    }

    #login button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 5px;
      border: none;
      background-color: #2e7d32;
      color: white;
      transition: background-color 0.3s;
    }

    #login button:hover {
      background-color: #1b4f19;
    }

    #erro {
      color: #ff6b6b;
      font-weight: bold;
      height: 20px;
    }
  </style>
</head>

<body>

  <!-- Tela de Login -->
  <div id="login">
    <h2>Login</h2>
    <input type="text" id="usuario" placeholder="Usuário" autocomplete="username" /><br />
    <input type="password" id="senha" placeholder="Senha" autocomplete="current-password" /><br />
    <button onclick="entrar()">Entrar</button>
    <p id="erro"></p>
  </div>

  <!-- Conteúdo do site, oculto inicialmente -->
  <div id="site" style="display: none;">
    <header>
      <h1>Setor de Conservação 🌿</h1>
      <p>Clique em cada pessoa para saber mais</p>
    </header>

    <div class="team">
      <div class="member active" data-nome="Francisco"
        data-desc="Um rapaz sofredor pelo seu time do coração INTERNACIONAL e que busca evoluir como profissional dentro da área em que atua.">
        <img src="Francisco/Chico.png" alt="Foto de Francisco" />
        <h3>Francisco</h3>
      </div>

      <div class="member" data-nome="Michele"
        data-desc="Responsável por cuidar do jovem aprendiz Chico e manter tudo organizado. Também é fanática athleticana.">
        <img src="https://i.pravatar.cc/300?img=5" alt="Foto de Michele" />
        <h3>Michele</h3>
      </div>

      <div class="member" data-nome="Domingos"
        data-desc="Um jovem senhor cabeludo que entende muito de BI e Excel.">
        <img src="https://i.pravatar.cc/300?img=8" alt="Foto de Domingos" />
        <h3>Domingos</h3>
      </div>

      <div class="member" data-nome="Isabella"
        data-desc="Responsável por trabalhar duro para trazer alimento para o Chico (seu cachorro).">
        <img src="https://i.pravatar.cc/300?img=20" alt="Foto de Isabella" />
        <h3>Isabella</h3>
      </div>

      <div class="member" data-nome="Pereira"
        data-desc="Responsável pelas decisões importantes e pelo futuro da equipe.">
        <img src="https://i.pravatar.cc/300?img=15" alt="Foto de Pereira" />
        <h3>Pereira</h3>
      </div>
    </div>

    <div class="info" id="info">
      <b>Francisco</b><br />
      Um rapaz sofredor pelo seu time do coração INTERNACIONAL e que busca evoluir como profissional dentro da área em que atua.
    </div>

    <footer>
      SITE FEITO POR FRANCISCO NOGUEIRA
    </footer>
  </div>

  <script src="site.js"></script>
</body>

</html>
